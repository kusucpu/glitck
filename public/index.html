<!DOCTYPE html>
<html lang="en" data-theme="auto">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>glitch.</title>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>◈</text></svg>">
</head>
<body>
  <div class="app">

    <header class="header">
      <div class="logo">glitch<span class="dot">.</span></div>
      <div class="header-actions">
        <button id="historyBtn" class="icon-btn" title="Image history">⊞</button>
        <button id="themeBtn" class="icon-btn" title="Toggle theme">◑</button>
      </div>
    </header>

    <div class="chat-wrap" id="chatWrap">
      <div class="chat" id="chat">
        <div class="msg bot">
          <div class="avatar">◈</div>
          <div class="bubble">
            hey. i'm <strong>glitch</strong> — your slightly unhinged AI assistant.<br>
            ask me anything. i'll answer. probably correctly.<br>
            <span class="hint">💡 if i suggest an image prompt, click it to generate.</span>
          </div>
        </div>
      </div>
    </div>

    <div class="input-area">
      <div class="input-wrap">
        <textarea id="input" placeholder="ask something..." rows="1"></textarea>
        <button id="sendBtn" class="send-btn">↑</button>
      </div>
      <div class="model-row">
        <select id="modelSelect">
          <option value="openai">openai (gpt-5)</option>
          <option value="openai-fast">openai fast</option>
          <option value="mistral">mistral</option>
          <option value="claude-hybridspace">claude</option>
          <option value="gemini">gemini</option>
          <option value="deepseek">deepseek</option>
        </select>
        <span class="powered">via pollinations.ai</span>
      </div>
    </div>

  </div>

  <!-- History Panel -->
  <div class="overlay" id="overlay"></div>
  <aside class="history-panel" id="historyPanel">
    <div class="panel-header">
      <span>image history</span>
      <button id="closeHistory" class="icon-btn">✕</button>
    </div>
    <div class="panel-content" id="historyContent"></div>
    <div class="panel-footer">
      <button id="clearHistory" class="clear-btn">clear all</button>
    </div>
  </aside>

  <script src="script.js"></script>
</body>
</html>
